name: Release

on:
  push:
    tags:
      - "v*"           # triggers on v1.0.0, v1.2.3, etc.

permissions:
  contents: write      # needed to create GitHub Releases

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
        env:
          CARGO_HTTP_CHECK_REVOKE: "false"

      - name: Install frontend deps
        run: npm ci

      - name: Build & bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CARGO_HTTP_CHECK_REVOKE: "false"
        run: cargo tauri build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Locate build artifacts and generate latest.json
        id: artifacts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ github.ref_name }}"
          BUNDLE_DIR="src-tauri/target/release/bundle/nsis"

          echo "=== NSIS bundle directory contents ==="
          ls -lh "$BUNDLE_DIR/" || true

          # Use glob to find the actual files regardless of spaces vs dots in product name
          EXE=$(find "$BUNDLE_DIR" -name "*${VERSION}*x64-setup.exe" | head -1)
          ZIP=$(find "$BUNDLE_DIR" -name "*${VERSION}*x64-setup.nsis.zip" | head -1)
          SIG=$(find "$BUNDLE_DIR" -name "*${VERSION}*x64-setup.nsis.zip.sig" | head -1)

          echo "EXE found: $EXE"
          echo "ZIP found: $ZIP"
          echo "SIG found: $SIG"

          echo "EXE=$EXE" >> $GITHUB_OUTPUT
          echo "ZIP=$ZIP" >> $GITHUB_OUTPUT
          echo "SIG=$SIG" >> $GITHUB_OUTPUT

          # Read signature content
          if [ -f "$SIG" ]; then
            SIGNATURE=$(cat "$SIG")
            echo "Signature found (${#SIGNATURE} chars)"
          else
            SIGNATURE=""
            echo "WARNING: No .sig file found — updater signature will be empty"
          fi

          # The download URL must match the filename that gets uploaded to the release.
          # URL-encode spaces as %20 so the Tauri updater can download it.
          ZIP_BASENAME=$(basename "$ZIP")
          ZIP_BASENAME_ENCODED="${ZIP_BASENAME// /%20}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_BASENAME_ENCODED}"

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Write latest.json — use printf to avoid heredoc indentation issues
          printf '{\n  "version": "%s",\n  "notes": "See the release page for full release notes.",\n  "pub_date": "%s",\n  "platforms": {\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "%s"\n    }\n  }\n}\n' \
            "$VERSION" "$PUB_DATE" "$SIGNATURE" "$DOWNLOAD_URL" > latest.json

          echo "=== Generated latest.json ==="
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KRB Explorer ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.EXE }}
            ${{ steps.artifacts.outputs.ZIP }}
            ${{ steps.artifacts.outputs.SIG }}
            latest.json
